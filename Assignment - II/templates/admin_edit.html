{% extends "base.html" %}
{% block content %}

<section class="page-hero page-hero--admin">
  <div class="container">
    <h1>✏️ Edit Event</h1>
    <p>Update details for: <strong>{{ event.name }}</strong></p>
  </div>
</section>
<section class="section">
  <div class="container">
    <div class="admin-section" style="max-width:700px;margin:0 auto;">
      <form action="{{ url_for('admin_edit', event_id=event.id) }}" method="POST" class="admin-form">
        <div class="form-row">
          <div class="form-group">
            <label>Event Name *</label>
            <input type="text" name="name" value="{{ event.name }}" required />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select name="category">
              {% for cat in ['Technology','Cultural','Sports','Arts','Music','Business','Other'] %}
              <option {% if event.category==cat %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" value="{{ event.date }}" />
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="text" name="time" value="{{ event.time }}" />
          </div>
          <div class="form-group">
            <label>Venue</label>
            <input type="text" name="venue" value="{{ event.venue }}" />
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="3">{{ event.description }}</textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" name="image" value="{{ event.image }}" />
        </div>
        <div style="display:flex;gap:1rem;">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{{ url_for('admin') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
